<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who Dat?</title>
  <style>
    body { margin: 0; background: #fff; display: flex; justify-content: center; }
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap');

    :root {
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666;
      --color-text-danger: #A32D2D;
      --color-text-success: #3B6D11;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f3;
      --color-background-danger: #fcebeb;
      --color-border-primary: rgba(0,0,0,0.4);
      --color-border-secondary: rgba(0,0,0,0.3);
      --color-border-tertiary: rgba(0,0,0,0.15);
      --color-border-danger: #f09595;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      :root {
        --color-text-primary: #f0f0ee;
        --color-text-secondary: #999;
        --color-text-danger: #f09595;
        --color-text-success: #97c459;
        --color-background-primary: #242422;
        --color-background-secondary: #2c2c2a;
        --color-background-danger: #501313;
        --color-border-primary: rgba(255,255,255,0.4);
        --color-border-secondary: rgba(255,255,255,0.3);
        --color-border-tertiary: rgba(255,255,255,0.15);
        --color-border-danger: #791f1f;
      }
    }

    .gw{font-family:'DM Sans',sans-serif;max-width:460px;margin:0 auto;padding:1.5rem 1rem 2rem;text-align:center}
    .gtitle{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--color-text-primary);margin:0 0 2px;letter-spacing:-0.5px}
    .gsub{font-size:11px;color:var(--color-text-secondary);margin:0 0 1.25rem;letter-spacing:0.8px;text-transform:uppercase}
    .scorebar{display:flex;justify-content:center;gap:24px;margin-bottom:1.25rem;font-size:13px;color:var(--color-text-secondary)}
    .scorebar span strong{font-weight:500;color:var(--color-text-primary)}
    .gbadge{display:inline-block;font-size:12px;font-weight:500;padding:3px 12px;border-radius:99px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);margin-bottom:1rem}
    .gbadge.last{color:var(--color-text-danger);border-color:var(--color-border-danger)}
    .category-tag{display:inline-block;font-size:11px;padding:2px 10px;border-radius:99px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);margin-bottom:0.75rem;letter-spacing:0.4px}
    .photo-wrap{width:160px;height:160px;margin:0 auto 1rem}
    .photo-wrap img{width:160px;height:160px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid var(--color-border-tertiary);display:block;background:var(--color-background-secondary)}
    .name-layout{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:0 0 1rem;min-height:38px;align-items:flex-end}
    .name-word{display:flex;gap:4px;align-items:flex-end}
    .letter-box{width:20px;height:28px;border-bottom:2px solid var(--color-border-primary);display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;font-size:14px;font-weight:500;color:var(--color-text-primary);font-family:'DM Sans',sans-serif;line-height:1;transition:color 0.2s,border-color 0.2s}
    .letter-box.revealed{color:#3B6D11;border-color:#3B6D11}
    .letter-box.blank{color:transparent}
    .guess-feedback{margin-bottom:0.75rem;min-height:28px}
    .gpill{display:inline-flex;gap:4px;align-items:center;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:500;margin:3px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
    .input-row{display:flex;gap:8px;margin-bottom:0.5rem}
    .input-row input{flex:1;font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
    .input-row input:focus{border-color:var(--color-border-primary);box-shadow:0 0 0 2px rgba(0,0,0,0.05)}
    .input-row button{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:10px 18px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
    .input-row button:hover{background:var(--color-background-secondary)}
    .input-row button:active{transform:scale(0.97)}
    .result-card{border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);padding:1.25rem;margin-top:1rem;display:none}
    .result-card.show{display:block}
    .cat-emoji{font-size:52px;display:block;margin:0 0 0.25rem}
    .outcome-win{font-size:14px;font-weight:500;color:var(--color-text-success);margin:0 0 0.75rem;line-height:1.5}
    .outcome-loss{font-size:14px;font-weight:500;color:var(--color-text-danger);margin:0 0 0.75rem;line-height:1.5}
    .reveal-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--color-text-primary);margin:0.5rem 0 0.1rem}
    .reveal-cat{font-size:12px;color:var(--color-text-secondary);margin:0 0 0.75rem;letter-spacing:0.4px;text-transform:uppercase}
    .funfact{font-size:13px;color:var(--color-text-secondary);line-height:1.6;border-top:0.5px solid var(--color-border-tertiary);padding-top:0.75rem;text-align:left}
    .funfact strong{color:var(--color-text-primary);font-weight:500}
    .next-btn{margin-top:1rem;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:9px 24px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
    .next-btn:hover{background:var(--color-background-secondary)}
  </style>
</head>
<body>
<div class="gw">
  <div class="gtitle">Who Dat?</div>
  <div class="gsub">Famous faces. 2 guesses.</div>
  <div class="scorebar">
    <span>Won <strong id="sw">0</strong></span>
    <span>Lost <strong id="sl">0</strong></span>
    <span>Streak <strong id="ss">0</strong></span>
  </div>
  <div class="gbadge" id="gleft">2 guesses left</div><br>
  <div class="category-tag" id="cat-tag">—</div>
  <div class="photo-wrap"><img id="main-photo" src="" alt="Who?" /></div>
  <div class="name-layout" id="name-layout"></div>
  <div class="guess-feedback" id="guess-feedback"></div>
  <div class="input-row" id="input-row">
    <input type="text" id="ginput" placeholder="First and/or last name..." autocomplete="off" />
    <button onclick="submitGuess()">Guess</button>
  </div>
  <div class="result-card" id="result-card">
    <span class="cat-emoji" id="cat-emoji"></span>
    <div id="outcome-msg"></div>
    <img id="reveal-photo" style="width:110px;height:110px;border-radius:50%;object-fit:cover;object-position:top;margin:0 auto 0.5rem;display:block;border:2px solid var(--color-border-tertiary);" src="" alt="" />
    <div class="reveal-name" id="reveal-name"></div>
    <div class="reveal-cat" id="reveal-cat"></div>
    <div class="funfact" id="funfact"></div>
    <button class="next-btn" onclick="nextPerson()">Next →</button>
  </div>
</div>

<script>
const people=[
  {name:"Michael Jordan",cat:"Athlete",photo:"famous_people_images/001_Michael Jordan.jpg",fact:"<strong>6x NBA champion.</strong> Cut from his high school varsity team sophomore year. Went on to become the gold standard every athlete is measured against."},
  {name:"Oprah Winfrey",cat:"Entertainer",photo:"famous_people_images/002_Oprah Winfrey.jpg",fact:"<strong>Billionaire media mogul.</strong> Grew up in poverty in rural Mississippi. Her talk show ran for 25 years and is the highest-rated in TV history."},
  {name:"Beyoncé",cat:"Musician",photo:"famous_people_images/003_Beyoncé.jpg",fact:"<strong>32 Grammy Awards.</strong> Most awarded artist in Grammy history. Started in Destiny's Child before going solo."},
  {name:"Muhammad Ali",cat:"Athlete",photo:"famous_people_images/004_Muhammad Ali.jpg",fact:"<strong>3x world heavyweight champion.</strong> Refused military draft, stripped of his title, came back and won it twice more."},
  {name:"Marilyn Monroe",cat:"Entertainer",photo:"famous_people_images/005_Marilyn Monroe.jpg",fact:"<strong>Cultural icon of the 1950s–60s.</strong> Born Norma Jeane Mortenson. Famously sang 'Happy Birthday' to President JFK in 1962."},
  {name:"Barack Obama",cat:"Historical / Political",photo:"famous_people_images/006_Barack Obama.jpg",fact:"<strong>44th U.S. President.</strong> First African American president. Nobel Peace Prize winner in 2009."},
  {name:"Nelson Mandela",cat:"Historical / Political",photo:"famous_people_images/007_Nelson Mandela.jpg",fact:"<strong>First democratically elected president of South Africa.</strong> Spent 27 years in prison for anti-apartheid activism."},
  {name:"Albert Einstein",cat:"Historical / Political",photo:"famous_people_images/008_Albert Einstein.jpg",fact:"<strong>Developed the theory of relativity.</strong> Failed his first university entrance exam. His brain was literally preserved after death for scientific study."},
  {name:"Freddie Mercury",cat:"Musician",photo:"famous_people_images/009_Freddie Mercury.jpg",fact:"<strong>Lead singer of Queen.</strong> His Live Aid performance in 1985 is widely called the greatest rock concert performance in history."},
  {name:"Serena Williams",cat:"Athlete",photo:"famous_people_images/010_Serena Williams.jpg",fact:"<strong>23 Grand Slam titles.</strong> Won the Australian Open in 2017 while 8 weeks pregnant."},
  {name:"Steve Jobs",cat:"Historical / Political",photo:"famous_people_images/011_Steve Jobs.jpg",fact:"<strong>Co-founded Apple in a garage.</strong> Was fired from his own company, came back and turned it into the most valuable company on Earth."},
  {name:"Frida Kahlo",cat:"Historical / Political",photo:"famous_people_images/012_Frida Kahlo.jpg",fact:"<strong>Iconic Mexican painter.</strong> Survived polio and a near-fatal bus accident. Most of her 143 paintings are self-portraits."},
  {name:"Bruce Lee",cat:"Entertainer",photo:"famous_people_images/013_Bruce Lee.jpg",fact:"<strong>Founder of Jeet Kune Do.</strong> Could do one-finger push-ups. His punches were too fast for cameras of the era to capture."},
  {name:"Nikola Tesla",cat:"Historical / Political",photo:"famous_people_images/014_Nikola Tesla.jpg",fact:"<strong>Invented AC electricity.</strong> Had a rivalry with Edison so intense it was called the 'War of Currents.'"},
  {name:"Audrey Hepburn",cat:"Entertainer",photo:"famous_people_images/015_Audrey Hepburn.jpg",fact:"<strong>One of 16 EGOT winners ever.</strong> Survived Nazi occupation as a child. Spent her later years as a UNICEF Goodwill Ambassador."},
  {name:"Martin Luther King Jr",cat:"Historical / Political",photo:"famous_people_images/016_Martin Luther King Jr.jpg",fact:"<strong>Led the American civil rights movement.</strong> Delivered 'I Have a Dream' at age 34. Youngest Nobel Peace Prize winner at the time."},
  {name:"Charlie Chaplin",cat:"Entertainer",photo:"famous_people_images/017_Charlie Chaplin.jpg",fact:"<strong>Pioneer of silent film comedy.</strong> Once entered a Charlie Chaplin lookalike contest — and came in third place."},
  {name:"Billie Holiday",cat:"Musician",photo:"famous_people_images/018_Billie Holiday.jpg",fact:"<strong>One of the greatest jazz vocalists ever.</strong> Her 1939 recording of 'Strange Fruit' was called the song of the century by Time magazine."},
  {name:"Usain Bolt",cat:"Athlete",photo:"famous_people_images/019_Usain Bolt.jpg",fact:"<strong>World's fastest human.</strong> Set the 100m world record of 9.58 seconds in 2009. Doctors said his scoliosis should have stopped him."},
  {name:"Coco Chanel",cat:"Historical / Political",photo:"famous_people_images/020_Coco Chanel.jpg",fact:"<strong>Revolutionized women's fashion.</strong> Grew up in an orphanage. Invented the little black dress and Chanel No. 5."},
  {name:"Leonardo da Vinci",cat:"Historical / Political",photo:"famous_people_images/021_Leonardo da Vinci.jpg",fact:"<strong>Renaissance polymath.</strong> Painted the Mona Lisa and designed flying machines centuries ahead of their time."},
  {name:"Isaac Newton",cat:"Historical / Political",photo:"famous_people_images/022_Isaac Newton.jpg",fact:"<strong>Formulated laws of motion and gravity.</strong> Discovered calculus independently and studied optics with prisms."},
  {name:"Mahatma Gandhi",cat:"Historical / Political",photo:"famous_people_images/023_Mahatma Gandhi.jpg",fact:"<strong>Led India's non-violent independence.</strong> Walked 240 miles for the salt march against British rule."},
  {name:"Marie Curie",cat:"Historical / Political",photo:"famous_people_images/024_Marie Curie.jpg",fact:"<strong>Discovered radium and polonium.</strong> First woman to win a Nobel Prize, and the only person to win in two sciences."},
  {name:"William Shakespeare",cat:"Historical / Political",photo:"famous_people_images/025_William Shakespeare.jpg",fact:"<strong>Master playwright and poet.</strong> Wrote 37 plays and 154 sonnets, inventing over 1,700 words in English."},
  {name:"Abraham Lincoln",cat:"Historical / Political",photo:"famous_people_images/026_Abraham Lincoln.jpg",fact:"<strong>Preserved the Union during the Civil War.</strong> Issued the Emancipation Proclamation and delivered the Gettysburg Address."},
  {name:"Wolfgang Amadeus Mozart",cat:"Musician",photo:"famous_people_images/027_Wolfgang Amadeus Mozart.jpg",fact:"<strong>Child prodigy composer.</strong> Composed his first symphony at age 8 and over 600 works total."},
  {name:"Ludwig van Beethoven",cat:"Musician",photo:"famous_people_images/028_Ludwig van Beethoven.jpg",fact:"<strong>Deaf symphony composer.</strong> Wrote nine symphonies despite losing his hearing, including the iconic Ninth."},
  {name:"Vincent van Gogh",cat:"Historical / Political",photo:"famous_people_images/029_Vincent van Gogh.jpg",fact:"<strong>Post-impressionist painter.</strong> Sold only one painting in his lifetime but created over 2,000 artworks, including Starry Night."},
  {name:"Charles Darwin",cat:"Historical / Political",photo:"famous_people_images/030_Charles Darwin.jpg",fact:"<strong>Developed the theory of evolution.</strong> His voyage on the Beagle inspired On the Origin of Species, revolutionizing biology."},
  {name:"Thomas Edison",cat:"Historical / Political",photo:"famous_people_images/031_Thomas Edison.jpg",fact:"<strong>Invented the practical light bulb.</strong> Held 1,093 patents, including the phonograph and motion pictures."},
  {name:"Alexander the Great",cat:"Historical / Political",photo:"famous_people_images/032_Alexander the Great.jpg",fact:"<strong>Conquered the ancient world.</strong> Built an empire from Greece to India, founding 20 cities named after himself."},
  {name:"Julius Caesar",cat:"Historical / Political",photo:"famous_people_images/033_Julius Caesar.jpg",fact:"<strong>Roman conqueror and dictator.</strong> Crossed the Rubicon to start a civil war and reformed the calendar still in use today."},
  {name:"Cleopatra",cat:"Historical / Political",photo:"famous_people_images/034_Cleopatra.jpg",fact:"<strong>Last pharaoh of Egypt.</strong> Ruled with intelligence and political cunning, forging alliances with Caesar and Antony."},
  {name:"Napoleon Bonaparte",cat:"Historical / Political",photo:"famous_people_images/035_Napoleon Bonaparte.jpg",fact:"<strong>French emperor and conqueror.</strong> Spread revolutionary ideas across Europe but was exiled twice."},
  {name:"Winston Churchill",cat:"Historical / Political",photo:"famous_people_images/036_Winston Churchill.jpg",fact:"<strong>Britain's WWII leader.</strong> Inspired a nation with his speeches and won the Nobel Prize for Literature."},
  {name:"George Washington",cat:"Historical / Political",photo:"famous_people_images/037_George Washington.jpg",fact:"<strong>First U.S. President.</strong> Led the Revolution to victory and set presidential precedents including the two-term limit."},
  {name:"Franklin D Roosevelt",cat:"Historical / Political",photo:"famous_people_images/038_Franklin D. Roosevelt.jpg",fact:"<strong>Depression and WWII President.</strong> Elected four times, launched the New Deal and Lend-Lease program."},
  {name:"John F Kennedy",cat:"Historical / Political",photo:"famous_people_images/039_John F. Kennedy.jpg",fact:"<strong>Youngest elected U.S. President.</strong> Inspired the space race with his Moon goal and was assassinated in 1963."},
  {name:"Malala Yousafzai",cat:"Historical / Political",photo:"famous_people_images/040_Malala Yousafzai.jpg",fact:"<strong>Girls' education advocate.</strong> Survived a Taliban shooting and became the youngest Nobel laureate at age 17."},
  {name:"Mother Teresa",cat:"Historical / Political",photo:"famous_people_images/041_Mother Teresa.jpg",fact:"<strong>Saint of the poor.</strong> Founded the Missionaries of Charity and spent decades serving Kolkata's destitute."},
  {name:"Dalai Lama",cat:"Historical / Political",photo:"famous_people_images/042_Dalai Lama.jpg",fact:"<strong>Tibetan spiritual leader.</strong> Exiled since 1959, he promotes compassion and non-violence worldwide."},
  {name:"Elon Musk",cat:"Historical / Political",photo:"famous_people_images/043_Elon Musk.jpg",fact:"<strong>SpaceX and Tesla CEO.</strong> Aims to colonize Mars and revolutionized both electric cars and rocket science."},
  {name:"Bill Gates",cat:"Historical / Political",photo:"famous_people_images/044_Bill Gates.jpg",fact:"<strong>Microsoft co-founder.</strong> Was the world's richest person for years and now runs the Gates Foundation."},
  {name:"Mark Zuckerberg",cat:"Historical / Political",photo:"famous_people_images/045_Mark Zuckerberg.jpg",fact:"<strong>Facebook creator.</strong> Built the social network from his dorm room; now Meta CEO facing global privacy battles."},
  {name:"Jeff Bezos",cat:"Historical / Political",photo:"famous_people_images/046_Jeff Bezos.jpg",fact:"<strong>Amazon founder.</strong> Started in a garage and built the world's largest e-commerce empire."},
  {name:"Stephen Hawking",cat:"Historical / Political",photo:"famous_people_images/047_Stephen Hawking.jpg",fact:"<strong>Black hole theorist.</strong> ALS left him paralyzed but he wrote A Brief History of Time and redefined cosmology."},
  {name:"Neil Armstrong",cat:"Historical / Political",photo:"famous_people_images/048_Neil Armstrong.jpg",fact:"<strong>First person to walk on the Moon.</strong> Apollo 11 astronaut whose 'one small step' was heard around the world."},
  {name:"Rosa Parks",cat:"Historical / Political",photo:"famous_people_images/049_Rosa Parks.jpg",fact:"<strong>Civil rights spark.</strong> Her refusal to give up her bus seat ignited the Montgomery boycott."},
  {name:"Amelia Earhart",cat:"Historical / Political",photo:"famous_people_images/050_Amelia Earhart.jpg",fact:"<strong>Aviation pioneer.</strong> First woman to fly solo across the Atlantic. Vanished over the Pacific in 1937."},
  {name:"Pablo Picasso",cat:"Historical / Political",photo:"famous_people_images/051_Pablo Picasso.jpg",fact:"<strong>Cubism co-founder.</strong> Painted Guernica as a protest against war and created over 50,000 works in his lifetime."},
  {name:"Salvador Dalí",cat:"Historical / Political",photo:"famous_people_images/052_Salvador Dalí.jpg",fact:"<strong>Surrealist artist.</strong> His melting clocks in The Persistence of Memory made him one of art history's most recognizable icons."},
  {name:"Michelangelo",cat:"Historical / Political",photo:"famous_people_images/053_Michelangelo.jpg",fact:"<strong>Renaissance sculptor.</strong> Carved David and painted the Sistine Chapel ceiling while lying on scaffolding for four years."},
  {name:"Galileo Galilei",cat:"Historical / Political",photo:"famous_people_images/054_Galileo Galilei.jpg",fact:"<strong>Father of modern science.</strong> Championed heliocentrism and was condemned by the Church for it."},
  {name:"Socrates",cat:"Historical / Political",photo:"famous_people_images/055_Socrates.jpg",fact:"<strong>Founder of Western philosophy.</strong> His questioning method was so threatening he was executed by hemlock for 'corrupting youth.'"},
  {name:"Plato",cat:"Historical / Political",photo:"famous_people_images/056_Plato.jpg",fact:"<strong>Founded the Academy.</strong> Student of Socrates and wrote The Republic on the ideal society."},
  {name:"Aristotle",cat:"Historical / Political",photo:"famous_people_images/057_Aristotle.jpg",fact:"<strong>Ancient polymath.</strong> Tutored Alexander the Great and founded the Lyceum."},
  {name:"Confucius",cat:"Historical / Political",photo:"famous_people_images/058_Confucius.jpg",fact:"<strong>Chinese ethics teacher.</strong> His Analects have guided governance and morality for over two thousand years."},
  {name:"Laozi",cat:"Historical / Political",photo:"famous_people_images/059_Laozi.jpg",fact:"<strong>Taoism originator.</strong> The Tao Te Ching teaches harmony with nature — though Laozi himself may be a mythical figure."},
  {name:"Buddha",cat:"Historical / Political",photo:"famous_people_images/060_Buddha.jpg",fact:"<strong>Founder of Buddhism.</strong> Reached enlightenment under a Bodhi tree and taught the Four Noble Truths to end suffering."},
  {name:"Jesus Christ",cat:"Historical / Political",photo:"famous_people_images/061_Jesus Christ.jpg",fact:"<strong>Central figure of Christianity.</strong> His teachings on love and resurrection shaped the world's largest religion."},
  {name:"Muhammad",cat:"Historical / Political",photo:"famous_people_images/062_Muhammad.jpg",fact:"<strong>Prophet of Islam.</strong> Received revelations forming the Quran and unified Arabia under a new faith."},
  {name:"Joan of Arc",cat:"Historical / Political",photo:"famous_people_images/063_Joan of Arc.jpg",fact:"<strong>French military saint.</strong> Led the French army at age 17, was burned at the stake by the English, and later canonized."},
  {name:"Queen Elizabeth I",cat:"Historical / Political",photo:"famous_people_images/064_Queen Elizabeth I.jpg",fact:"<strong>Elizabethan England's ruler.</strong> Defeated the Spanish Armada and presided over a Golden Age of exploration and the arts."},
  {name:"Queen Victoria",cat:"Historical / Political",photo:"famous_people_images/065_Queen Victoria.jpg",fact:"<strong>Victorian Era monarch.</strong> Britain's longest-reigning monarch at the time, ruling over the peak of the British Empire."},
  {name:"Catherine the Great",cat:"Historical / Political",photo:"famous_people_images/066_Catherine the Great.jpg",fact:"<strong>Russia's greatest empress.</strong> Seized power in a coup and expanded the Russian empire further than any before her."},
  {name:"Simon Bolivar",cat:"Historical / Political",photo:"famous_people_images/067_Simon Bolivar.jpg",fact:"<strong>South America's liberator.</strong> Freed Venezuela, Colombia, Ecuador, Peru, and Bolivia — the latter named after him."},
  {name:"Che Guevara",cat:"Historical / Political",photo:"famous_people_images/068_Che Guevara.jpg",fact:"<strong>Cuban revolution icon.</strong> Became a global symbol of rebellion after fighting alongside Castro; executed in Bolivia in 1967."},
  {name:"Fidel Castro",cat:"Historical / Political",photo:"famous_people_images/069_Fidel Castro.jpg",fact:"<strong>Cuba's long-ruling leader.</strong> Overthrew Batista in 1959 and led a communist government for nearly 50 years."},
  {name:"Mao Zedong",cat:"Historical / Political",photo:"famous_people_images/070_Mao Zedong.jpg",fact:"<strong>Founder of Communist China.</strong> Led the Long March and launched the Cultural Revolution that upended a generation."},
  {name:"Joseph Stalin",cat:"Historical / Political",photo:"famous_people_images/071_Joseph Stalin.jpg",fact:"<strong>Soviet dictator.</strong> Industrialized the USSR rapidly but his purges and gulags killed millions of his own people."},
  {name:"Adolf Hitler",cat:"Historical / Political",photo:"famous_people_images/072_Adolf Hitler.jpg",fact:"<strong>Nazi Germany's leader.</strong> Instigated World War II and was the architect of the Holocaust, killing six million Jews."},
  {name:"Elvis Presley",cat:"Musician",photo:"famous_people_images/073_Elvis Presley.jpg",fact:"<strong>The King of Rock 'n' Roll.</strong> Sold over a billion records worldwide and sparked a cultural revolution in the 1950s."},
  {name:"The Beatles",cat:"Musician",photo:"famous_people_images/074_The Beatles.jpg",fact:"<strong>The greatest band in history.</strong> The Fab Four changed pop music forever and remain the best-selling band of all time."},
  {name:"Michael Jackson",cat:"Musician",photo:"famous_people_images/075_Michael Jackson.jpg",fact:"<strong>The King of Pop.</strong> Thriller is the best-selling album of all time. He invented the moonwalk and redefined music videos."},
  {name:"Bob Dylan",cat:"Musician",photo:"famous_people_images/076_Bob Dylan.jpg",fact:"<strong>Folk protest poet.</strong> Won the Nobel Prize for Literature and wrote Blowin' in the Wind as a generation-defining anthem."},
  {name:"David Bowie",cat:"Musician",photo:"famous_people_images/077_David Bowie.jpg",fact:"<strong>Rock's great chameleon.</strong> From Ziggy Stardust to Let's Dance, sold over 100 million records across five decades."},
  {name:"Madonna",cat:"Musician",photo:"famous_people_images/078_Madonna.jpg",fact:"<strong>The Queen of Pop.</strong> Reinvented herself across four decades with 12 number-one hits and boundary-pushing videos."},
  {name:"Prince",cat:"Musician",photo:"famous_people_images/079_Prince.jpg",fact:"<strong>Musical virtuoso.</strong> Could play 27 instruments, wrote Purple Rain, and famously fought his label over his own name."},

const sadCats=["😿","🙀","😾","😭","🐱"];
const happyCats=["😸","😻","😺","🥳","✨"];
const roasts=["Not a clue, huh. They've been on magazine covers for decades.","This person is literally in every history textbook. Every. Single. One.","They have a Wikipedia page longer than most novels. And yet.","A statue exists of this person. In multiple countries.","They were on the news the day you were born. Probably.","Your sports knowledge left. Your general knowledge followed."];
const wins=["Look at you! One braincell and it came through.","Correct! Your cultural literacy lives another day.","Yes! Proof that doomscrolling teaches you something.","There it is. You're not completely lost."];

let current=null,guessesLeft=2,won=0,lost=0,streak=0,usedIdx=[];

function norm(s){return s.toLowerCase().replace(/[^a-z]/g,'');}
function normFull(s){return s.toLowerCase().replace(/[^a-z\s]/g,'').trim();}

function getPositionMatches(targetWord,guessWord){
  const t=targetWord.toLowerCase().replace(/[^a-z]/g,'');
  const g=guessWord.toLowerCase().replace(/[^a-z]/g,'');
  const matches=[];
  for(let i=0;i<t.length;i++) matches.push(i<g.length&&g[i]===t[i]);
  return matches;
}

function computeReveal(name,guessStr){
  const words=name.split(' ');
  const guessWords=guessStr?normFull(guessStr).split(' ').filter(w=>w.length>0):[];
  return words.map(word=>{
    const normWord=norm(word);
    let bestMatches=new Array(normWord.length).fill(false);
    guessWords.forEach(gw=>{
      const matches=getPositionMatches(normWord,gw);
      if(matches.filter(Boolean).length>bestMatches.filter(Boolean).length) bestMatches=matches;
    });
    return word.split('').map((char,i)=>{
      let normIdx=-1,count=0;
      for(let j=0;j<=i;j++){if(/[a-z]/i.test(word[j])){normIdx=count;count++;}}
      return {char,revealed:normIdx>=0&&normIdx<bestMatches.length&&bestMatches[normIdx]};
    });
  });
}

function renderLayout(name,guessStr,allRevealed){
  const layout=document.getElementById('name-layout');
  layout.innerHTML='';
  const words=allRevealed
    ?name.split(' ').map(w=>w.split('').map(c=>({char:c,revealed:true})))
    :(guessStr?computeReveal(name,guessStr):name.split(' ').map(w=>w.split('').map(c=>({char:c,revealed:false}))));
  words.forEach((wordArr,wi)=>{
    const wordDiv=document.createElement('div');
    wordDiv.className='name-word';
    wordArr.forEach(({char,revealed})=>{
      const box=document.createElement('div');
      box.className='letter-box '+(revealed?'revealed':'blank');
      box.textContent=char;
      wordDiv.appendChild(box);
    });
    layout.appendChild(wordDiv);
    if(wi<words.length-1){
      const gap=document.createElement('div');
      gap.style.cssText='width:12px;height:28px;flex-shrink:0;';
      layout.appendChild(gap);
    }
  });
}

function lev(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function wordStatus(gw,tw){
  if(gw===tw)return 'correct';
  if(tw.startsWith(gw)||gw.startsWith(tw))return 'close';
  return 1-(lev(gw,tw)/Math.max(gw.length,tw.length))>=0.5?'close':'wrong';
}

function nextPerson(){
  if(usedIdx.length>=people.length)usedIdx=[];
  let pool=people.filter((_,i)=>!usedIdx.includes(i));
  let p=pool[Math.floor(Math.random()*pool.length)];
  usedIdx.push(people.indexOf(p));
  current=p;guessesLeft=2;
  document.getElementById('main-photo').src=p.photo;
  document.getElementById('cat-tag').textContent=p.cat;
  document.getElementById('gleft').textContent='2 guesses left';
  document.getElementById('gleft').className='gbadge';
  document.getElementById('guess-feedback').innerHTML='';
  document.getElementById('ginput').value='';
  document.getElementById('input-row').style.display='flex';
  document.getElementById('result-card').className='result-card';
  document.getElementById('name-layout').innerHTML='';
  document.getElementById('ginput').focus();
  updateScore();
}

function updateScore(){
  document.getElementById('sw').textContent=won;
  document.getElementById('sl').textContent=lost;
  document.getElementById('ss').textContent=streak;
}

function submitGuess(){
  const inp=document.getElementById('ginput');
  const guess=inp.value.trim();
  if(!guess||!current)return;
  const cn=normFull(current.name);
  const gn=normFull(guess);
  const targetWords=cn.split(' ').filter(w=>w.length>1);
  const guessWords=gn.split(' ').filter(w=>w.length>1);
  const correct=gn===cn||guessWords.every(gw=>targetWords.some(tw=>wordStatus(gw,tw)==='correct'))||targetWords.some(tw=>tw===gn);
  if(correct){
    won++;streak++;
    renderLayout(current.name,guess,true);
    endGame(true);
  } else {
    guessesLeft--;
    const fb=document.getElementById('guess-feedback');
    const pill=document.createElement('span');
    pill.className='gpill';
    let html='';
    guessWords.forEach(gw=>{
      let best='wrong';
      targetWords.forEach(tw=>{const s=wordStatus(gw,tw);if(s==='correct')best='correct';else if(s==='close'&&best!=='correct')best='close';});
      const color=best==='correct'?'#3B6D11':best==='close'?'#BA7517':'#A32D2D';
      html+=`<span style="color:${color};font-weight:500;margin:0 2px">${gw}</span>`;
    });
    pill.innerHTML=html;
    fb.appendChild(pill);
    inp.value='';
    if(guessesLeft<=0){
      lost++;streak=0;
      renderLayout(current.name,null,true);
      endGame(false);
    } else {
      renderLayout(current.name,guess,false);
      document.getElementById('gleft').textContent='Last guess — green letters are in the right spot';
      document.getElementById('gleft').className='gbadge last';
    }
  }
}

function endGame(success){
  document.getElementById('input-row').style.display='none';
  document.getElementById('result-card').className='result-card show';
  document.getElementById('cat-emoji').textContent=success?happyCats[Math.floor(Math.random()*happyCats.length)]:sadCats[Math.floor(Math.random()*sadCats.length)];
  const msg=document.getElementById('outcome-msg');
  if(success)msg.innerHTML=`<div class="outcome-win">${wins[Math.floor(Math.random()*wins.length)]}</div>`;
  else msg.innerHTML=`<div class="outcome-loss">${roasts[Math.floor(Math.random()*roasts.length)]}</div>`;
  document.getElementById('reveal-photo').src=current.photo;
  document.getElementById('reveal-name').textContent=current.name;
  document.getElementById('reveal-cat').textContent=current.cat;
  document.getElementById('funfact').innerHTML=current.fact;
  updateScore();
}

document.getElementById('ginput').addEventListener('keydown',e=>{if(e.key==='Enter')submitGuess();});
nextPerson();
</script>
