<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who Dat?</title>
  <style>
    body { margin: 0; background: #fff; display: flex; justify-content: center; }
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap');

    :root {
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666;
      --color-text-danger: #A32D2D;
      --color-text-success: #3B6D11;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f3;
      --color-background-danger: #fcebeb;
      --color-border-primary: rgba(0,0,0,0.4);
      --color-border-secondary: rgba(0,0,0,0.3);
      --color-border-tertiary: rgba(0,0,0,0.15);
      --color-border-danger: #f09595;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      :root {
        --color-text-primary: #f0f0ee;
        --color-text-secondary: #999;
        --color-text-danger: #f09595;
        --color-text-success: #97c459;
        --color-background-primary: #242422;
        --color-background-secondary: #2c2c2a;
        --color-background-danger: #501313;
        --color-border-primary: rgba(255,255,255,0.4);
        --color-border-secondary: rgba(255,255,255,0.3);
        --color-border-tertiary: rgba(255,255,255,0.15);
        --color-border-danger: #791f1f;
      }
    }

    .gw{font-family:'DM Sans',sans-serif;max-width:460px;margin:0 auto;padding:1.5rem 1rem 2rem;text-align:center}
    .gtitle{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--color-text-primary);margin:0 0 2px;letter-spacing:-0.5px}
    .gsub{font-size:11px;color:var(--color-text-secondary);margin:0 0 1.25rem;letter-spacing:0.8px;text-transform:uppercase}
    .scorebar{display:flex;justify-content:center;gap:24px;margin-bottom:1.25rem;font-size:13px;color:var(--color-text-secondary)}
    .scorebar span strong{font-weight:500;color:var(--color-text-primary)}
    .gbadge{display:inline-block;font-size:12px;font-weight:500;padding:3px 12px;border-radius:99px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);margin-bottom:1rem}
    .gbadge.last{color:var(--color-text-danger);border-color:var(--color-border-danger)}
    .category-tag{display:inline-block;font-size:11px;padding:2px 10px;border-radius:99px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);margin-bottom:0.75rem;letter-spacing:0.4px}
    .photo-wrap{width:160px;height:160px;margin:0 auto 1rem}
    .photo-wrap img{width:160px;height:160px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid var(--color-border-tertiary);display:block;background:var(--color-background-secondary)}
    .name-layout{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:0 0 1rem;min-height:38px;align-items:flex-end}
    .name-word{display:flex;gap:4px;align-items:flex-end}
    .letter-box{width:20px;height:28px;border-bottom:2px solid var(--color-border-primary);display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;font-size:14px;font-weight:500;color:var(--color-text-primary);font-family:'DM Sans',sans-serif;line-height:1;transition:color 0.2s,border-color 0.2s}
    .letter-box.revealed{color:#3B6D11;border-color:#3B6D11}
    .letter-box.blank{color:transparent}
    .guess-feedback{margin-bottom:0.75rem;min-height:28px}
    .gpill{display:inline-flex;gap:4px;align-items:center;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:500;margin:3px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
    .input-row{display:flex;gap:8px;margin-bottom:0.5rem}
    .input-row input{flex:1;font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
    .input-row input:focus{border-color:var(--color-border-primary);box-shadow:0 0 0 2px rgba(0,0,0,0.05)}
    .input-row button{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:10px 18px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
    .input-row button:hover{background:var(--color-background-secondary)}
    .input-row button:active{transform:scale(0.97)}
    .result-card{border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);padding:1.25rem;margin-top:1rem;display:none}
    .result-card.show{display:block}
    .cat-emoji{font-size:52px;display:block;margin:0 0 0.25rem}
    .outcome-win{font-size:14px;font-weight:500;color:var(--color-text-success);margin:0 0 0.75rem;line-height:1.5}
    .outcome-loss{font-size:14px;font-weight:500;color:var(--color-text-danger);margin:0 0 0.75rem;line-height:1.5}
    .reveal-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--color-text-primary);margin:0.5rem 0 0.1rem}
    .reveal-cat{font-size:12px;color:var(--color-text-secondary);margin:0 0 0.75rem;letter-spacing:0.4px;text-transform:uppercase}
    .funfact{font-size:13px;color:var(--color-text-secondary);line-height:1.6;border-top:0.5px solid var(--color-border-tertiary);padding-top:0.75rem;text-align:left}
    .funfact strong{color:var(--color-text-primary);font-weight:500}
    .next-btn{margin-top:1rem;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:9px 24px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
    .next-btn:hover{background:var(--color-background-secondary)}
    .history-toggle{margin-top:2rem;padding-top:1.25rem;border-top:0.5px solid var(--color-border-tertiary);text-align:center}
    .history-toggle button{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 14px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;letter-spacing:0.3px}
    .history-toggle button:hover{background:var(--color-background-secondary)}
    .history-list{margin-top:1rem;display:none;text-align:left}
    .history-list.open{display:block}
    .history-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
    .history-item:last-child{border-bottom:none}
    .history-thumb{width:36px;height:36px;border-radius:50%;object-fit:cover;object-position:top;flex-shrink:0;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
    .history-info{flex:1;min-width:0}
    .history-name{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .history-guesses{font-size:11px;color:var(--color-text-secondary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .history-outcome{font-size:11px;font-weight:500;flex-shrink:0}
    .history-outcome.win{color:var(--color-text-success)}
    .history-outcome.loss{color:var(--color-text-danger)}
  </style>
</head>
<body>
<div class="gw">
  <div class="gtitle">Who Dat?</div>
  <div class="gsub">Famous faces. 2 guesses.</div>
  <div class="scorebar">
    <span>Won <strong id="sw">0</strong></span>
    <span>Lost <strong id="sl">0</strong></span>
    <span>Streak <strong id="ss">0</strong></span>
  </div>
  <div class="gbadge" id="gleft">2 guesses left</div><br>
  <div class="category-tag" id="cat-tag">—</div>
  <div class="photo-wrap"><img id="main-photo" src="" alt="Who?" /></div>
  <div class="name-layout" id="name-layout"></div>
  <div class="guess-feedback" id="guess-feedback"></div>
  <div class="input-row" id="input-row">
    <input type="text" id="ginput" placeholder="First and/or last name..." autocomplete="off" />
    <button onclick="submitGuess()">Guess</button>
  </div>
  <div class="result-card" id="result-card">
    <span class="cat-emoji" id="cat-emoji"></span>
    <div id="outcome-msg"></div>
    <div class="reveal-cat" id="reveal-cat"></div>
    <div class="funfact" id="funfact"></div>
    <button class="next-btn" onclick="nextPerson()">Next →</button>
  </div>
  <div class="history-toggle" id="history-toggle" style="display:none">
    <button onclick="toggleHistory()" id="history-btn">Show session history</button>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script>
const people=[
  {name:"Michael Jordan",cat:"Athlete",photo:"famous_people_images/1.jpg",fact:"<strong>6x NBA champion.</strong> Cut from his high school varsity team sophomore year. Went on to become the gold standard every athlete is measured against."},
  {name:"Oprah Winfrey",cat:"Entertainer",photo:"famous_people_images/2.jpg",fact:"<strong>Billionaire media mogul.</strong> Grew up in poverty in rural Mississippi. Her talk show ran for 25 years and is the highest-rated in TV history."},
  {name:"Beyonce",cat:"Musician",photo:"famous_people_images/3.jpg",fact:"<strong>32 Grammy Awards.</strong> Most awarded artist in Grammy history. Started in Destiny's Child before going solo."},
  {name:"Muhammad Ali",cat:"Athlete",photo:"famous_people_images/4.jpg",fact:"<strong>3x world heavyweight champion.</strong> Refused military draft, stripped of his title, came back and won it twice more."},
  {name:"Marilyn Monroe",cat:"Entertainer",photo:"famous_people_images/5.jpg",fact:"<strong>Cultural icon of the 1950s–60s.</strong> Born Norma Jeane Mortenson. Famously sang 'Happy Birthday' to President JFK in 1962."},
  {name:"Barack Obama",cat:"Historical / Political",photo:"famous_people_images/6.jpg",fact:"<strong>44th U.S. President.</strong> First African American president. Nobel Peace Prize winner in 2009."},
  {name:"Nelson Mandela",cat:"Historical / Political",photo:"famous_people_images/7.jpg",fact:"<strong>First democratically elected president of South Africa.</strong> Spent 27 years in prison for anti-apartheid activism."},
  {name:"Albert Einstein",cat:"Historical / Political",photo:"famous_people_images/8.jpg",fact:"<strong>Developed the theory of relativity.</strong> Failed his first university entrance exam. His brain was literally preserved after death for scientific study."},
  {name:"Freddie Mercury",cat:"Musician",photo:"famous_people_images/9.jpg",fact:"<strong>Lead singer of Queen.</strong> His Live Aid performance in 1985 is widely called the greatest rock concert performance in history."},
  {name:"Serena Williams",cat:"Athlete",photo:"famous_people_images/10.jpg",fact:"<strong>23 Grand Slam titles.</strong> Won the Australian Open in 2017 while 8 weeks pregnant."},
  {name:"Steve Jobs",cat:"Historical / Political",photo:"famous_people_images/11.jpg",fact:"<strong>Co-founded Apple in a garage.</strong> Was fired from his own company, came back and turned it into the most valuable company on Earth."},
  {name:"Frida Kahlo",cat:"Historical / Political",photo:"famous_people_images/12.jpg",fact:"<strong>Iconic Mexican painter.</strong> Survived polio and a near-fatal bus accident. Most of her 143 paintings are self-portraits."},
  {name:"Bruce Lee",cat:"Entertainer",photo:"famous_people_images/13.jpg",fact:"<strong>Founder of Jeet Kune Do.</strong> Could do one-finger push-ups. His punches were too fast for cameras of the era to capture."},
  {name:"Nikola Tesla",cat:"Historical / Political",photo:"famous_people_images/14.jpg",fact:"<strong>Invented AC electricity.</strong> Had a rivalry with Edison so intense it was called the 'War of Currents.'"},
  {name:"Audrey Hepburn",cat:"Entertainer",photo:"famous_people_images/15.jpg",fact:"<strong>One of 16 EGOT winners ever.</strong> Survived Nazi occupation as a child. Spent her later years as a UNICEF Goodwill Ambassador."},
  {name:"Martin Luther King Jr",cat:"Historical / Political",photo:"famous_people_images/16.jpg",fact:"<strong>Led the American civil rights movement.</strong> Delivered 'I Have a Dream' at age 34. Youngest Nobel Peace Prize winner at the time."},
  {name:"Charlie Chaplin",cat:"Entertainer",photo:"famous_people_images/17.jpg",fact:"<strong>Pioneer of silent film comedy.</strong> Once entered a Charlie Chaplin lookalike contest — and came in third place."},
  {name:"Billie Holiday",cat:"Musician",photo:"famous_people_images/18.jpg",fact:"<strong>One of the greatest jazz vocalists ever.</strong> Her 1939 recording of 'Strange Fruit' was called the song of the century by Time magazine."},
  {name:"Usain Bolt",cat:"Athlete",photo:"famous_people_images/19.jpg",fact:"<strong>World's fastest human.</strong> Set the 100m world record of 9.58 seconds in 2009. Doctors said his scoliosis should have stopped him."},
  {name:"Coco Chanel",cat:"Historical / Political",photo:"famous_people_images/20.jpg",fact:"<strong>Revolutionized women's fashion.</strong> Grew up in an orphanage. Invented the little black dress and Chanel No. 5."},
  {name:"Leonardo da Vinci",cat:"Historical / Political",photo:"famous_people_images/21.jpg",fact:"<strong>Renaissance polymath.</strong> Painted the Mona Lisa and designed flying machines centuries ahead of their time."},
  {name:"Isaac Newton",cat:"Historical / Political",photo:"famous_people_images/22.jpg",fact:"<strong>Formulated laws of motion and gravity.</strong> Discovered calculus independently and studied optics with prisms."},
  {name:"Mahatma Gandhi",cat:"Historical / Political",photo:"famous_people_images/23.jpg",fact:"<strong>Led India's non-violent independence.</strong> Walked 240 miles for the salt march against British rule."},
  {name:"Marie Curie",cat:"Historical / Political",photo:"famous_people_images/24.jpg",fact:"<strong>Discovered radium and polonium.</strong> First woman to win a Nobel Prize, and the only person to win in two sciences."},
  {name:"William Shakespeare",cat:"Historical / Political",photo:"famous_people_images/25.jpg",fact:"<strong>Master playwright and poet.</strong> Wrote 37 plays and 154 sonnets, inventing over 1,700 words in English."},
  {name:"Abraham Lincoln",cat:"Historical / Political",photo:"famous_people_images/26.jpg",fact:"<strong>Preserved the Union during Civil War.</strong> Issued Emancipation Proclamation and delivered Gettysburg Address."},
  {name:"Wolfgang Amadeus Mozart",cat:"Musician",photo:"famous_people_images/27.jpg",fact:"<strong>Child prodigy composer.</strong> Composed his first symphony at age 8 and over 600 works total."},
  {name:"Ludwig van Beethoven",cat:"Musician",photo:"famous_people_images/28.jpg",fact:"<strong>Deaf symphony composer.</strong> Wrote nine symphonies despite losing hearing, including the iconic Ninth."},
  {name:"Vincent van Gogh",cat:"Historical / Political",photo:"famous_people_images/29.jpg",fact:"<strong>Post-impressionist painter.</strong> Sold only one painting in life but created over 2,000 artworks, including Starry Night."},
  {name:"Charles Darwin",cat:"Historical / Political",photo:"famous_people_images/30.jpg",fact:"<strong>Developed evolution theory.</strong> Voyage on Beagle inspired On the Origin of Species, revolutionizing biology."},
  {name:"Thomas Edison",cat:"Historical / Political",photo:"famous_people_images/31.jpg",fact:"<strong>Invented practical light bulb.</strong> Held 1,093 patents, including phonograph and motion pictures."},
  {name:"Alexander the Great",cat:"Historical / Political",photo:"famous_people_images/32.jpg",fact:"<strong>Conquered ancient world.</strong> Built empire from Greece to India, founding 20 cities named after himself."},
  {name:"Julius Caesar",cat:"Historical / Political",photo:"famous_people_images/33.jpg",fact:"<strong>Roman conqueror and dictator.</strong> Crossed Rubicon to start civil war, reformed calendar still in use."},
  {name:"Cleopatra",cat:"Historical / Political",photo:"famous_people_images/34.jpg",fact:"<strong>Last pharaoh of Egypt.</strong> Ruled with intelligence, seducing Caesar and Antony to protect her kingdom."},
  {name:"Napoleon Bonaparte",cat:"Historical / Political",photo:"famous_people_images/35.jpg",fact:"<strong>French emperor conqueror.</strong> Spread revolutionary ideas across Europe but exiled twice."},
  {name:"Winston Churchill",cat:"Historical / Political",photo:"famous_people_images/36.jpg",fact:"<strong>WWII British leader.</strong> Inspired nation with speeches, won Nobel for literature."},
  {name:"George Washington",cat:"Historical / Political",photo:"famous_people_images/37.jpg",fact:"<strong>First U.S. President.</strong> Led Revolution to victory, set presidential precedents like two-term limit."},
  {name:"Franklin D. Roosevelt",cat:"Historical / Political",photo:"famous_people_images/38.jpg",fact:"<strong>Depression and WWII President.</strong> Elected four times, launched New Deal and Lend-Lease."},
  {name:"John F. Kennedy",cat:"Historical / Political",photo:"famous_people_images/39.jpg",fact:"<strong>Youngest U.S. President.</strong> Inspired space race with Moon goal, assassinated in 1963."},
  {name:"Malala Yousafzai",cat:"Historical / Political",photo:"famous_people_images/40.jpg",fact:"<strong>Girls' education advocate.</strong> Survived Taliban shooting, youngest Nobel laureate at 17."},
  {name:"Mother Teresa",cat:"Historical / Political",photo:"famous_people_images/41.jpg",fact:"<strong>Saint of the poor.</strong> Founded Missionaries of Charity, served Kolkata's destitute."},
  {name:"Dalai Lama",cat:"Historical / Political",photo:"famous_people_images/42.jpg",fact:"<strong>Tibetan spiritual leader.</strong> Exiled since 1959, promotes compassion and non-violence worldwide."},
  {name:"Elon Musk",cat:"Historical / Political",photo:"famous_people_images/43.jpg",fact:"<strong>SpaceX and Tesla CEO.</strong> Aims to colonize Mars, revolutionized electric cars and rockets."},
  {name:"Bill Gates",cat:"Historical / Political",photo:"famous_people_images/44.jpg",fact:"<strong>Microsoft co-founder.</strong> World's richest for years, now philanthropist via Gates Foundation."},
  {name:"Mark Zuckerberg",cat:"Historical / Political",photo:"famous_people_images/45.jpg",fact:"<strong>Facebook creator.</strong> Built social network from dorm, now Meta CEO facing privacy battles."},
  {name:"Jeff Bezos",cat:"Historical / Political",photo:"famous_people_images/46.jpg",fact:"<strong>Amazon founder.</strong> Started in garage, became e-commerce giant and space tourist."},
  {name:"Stephen Hawking",cat:"Historical / Political",photo:"famous_people_images/47.jpg",fact:"<strong>Black hole theorist.</strong> ALS paralyzed him but he wrote A Brief History of Time."},
  {name:"Neil Armstrong",cat:"Historical / Political",photo:"famous_people_images/48.jpg",fact:"<strong>First Moon walker.</strong> Apollo 11 astronaut, 'one small step' echoed globally."},
  {name:"Rosa Parks",cat:"Historical / Political",photo:"famous_people_images/49.jpg",fact:"<strong>Civil rights spark.</strong> Bus seat refusal ignited Montgomery boycott, 'mother of freedom'."},
  {name:"Amelia Earhart",cat:"Historical / Political",photo:"famous_people_images/50.jpg",fact:"<strong>Aviation pioneer.</strong> First woman to fly solo Atlantic, vanished over Pacific in 1937."},
  {name:"Pablo Picasso",cat:"Historical / Political",photo:"famous_people_images/51.jpg",fact:"<strong>Cubism co-founder.</strong> Painted Guernica protesting war, over 50,000 works created."},
  {name:"Salvador Dalí",cat:"Historical / Political",photo:"famous_people_images/52.jpg",fact:"<strong>Surrealist artist.</strong> Melting clocks in Persistence of Memory, eccentric mustache icon."},
  {name:"Michelangelo",cat:"Historical / Political",photo:"famous_people_images/53.jpg",fact:"<strong>Renaissance sculptor.</strong> Carved David and painted Sistine Chapel ceiling from scaffolding."},
  {name:"Galileo Galilei",cat:"Historical / Political",photo:"famous_people_images/54.jpg",fact:"<strong>Heliocentrism advocate.</strong> Telescope inventor, condemned by Church for Earth not center."},
  {name:"Socrates",cat:"Historical / Political",photo:"famous_people_images/55.jpg",fact:"<strong>Western philosophy founder.</strong> Questioning method led to execution by hemlock for 'corrupting youth'."},

const sadCats=["😿","🙀","😾","😭","🐱"];
const happyCats=["😸","😻","😺","🥳","✨"];
const roasts=["Not a clue, huh. They've been on magazine covers for decades.","This person is literally in every history textbook. Every. Single. One.","They have a Wikipedia page longer than most novels. And yet.","A statue exists of this person. In multiple countries.","They were on the news the day you were born. Probably.","Your sports knowledge left. Your general knowledge followed."];
const wins=["You got it, but don't let this distract you from the fact that you didn't know Michael Phelps","Correct! Your cultural literacy lives another day.","Yes! Proof that doomscrolling teaches you something.","There it is. You're not completely lost."];

let current=null,guessesLeft=2,won=0,lost=0,streak=0,usedIdx=[],sessionHistory=[];

function norm(s){return s.toLowerCase().replace(/[^a-z]/g,'');}
function normFull(s){return s.toLowerCase().replace(/[^a-z\s]/g,'').trim();}

function getPositionMatches(targetWord,guessWord){
  const t=targetWord.toLowerCase().replace(/[^a-z]/g,'');
  const g=guessWord.toLowerCase().replace(/[^a-z]/g,'');
  const matches=[];
  for(let i=0;i<t.length;i++) matches.push(i<g.length&&g[i]===t[i]);
  return matches;
}

function computeReveal(name,guessStr){
  const words=name.split(' ');
  const guessWords=guessStr?normFull(guessStr).split(' ').filter(w=>w.length>0):[];
  return words.map(word=>{
    const normWord=norm(word);
    let bestMatches=new Array(normWord.length).fill(false);
    guessWords.forEach(gw=>{
      const matches=getPositionMatches(normWord,gw);
      if(matches.filter(Boolean).length>bestMatches.filter(Boolean).length) bestMatches=matches;
    });
    return word.split('').map((char,i)=>{
      let normIdx=-1,count=0;
      for(let j=0;j<=i;j++){if(/[a-z]/i.test(word[j])){normIdx=count;count++;}}
      return {char,revealed:normIdx>=0&&normIdx<bestMatches.length&&bestMatches[normIdx]};
    });
  });
}

function renderLayout(name,guessStr,allRevealed){
  const layout=document.getElementById('name-layout');
  layout.innerHTML='';
  const words=allRevealed
    ?name.split(' ').map(w=>w.split('').map(c=>({char:c,revealed:true})))
    :(guessStr?computeReveal(name,guessStr):name.split(' ').map(w=>w.split('').map(c=>({char:c,revealed:false}))));
  words.forEach((wordArr,wi)=>{
    const wordDiv=document.createElement('div');
    wordDiv.className='name-word';
    wordArr.forEach(({char,revealed})=>{
      const box=document.createElement('div');
      box.className='letter-box '+(revealed?'revealed':'blank');
      box.textContent=char;
      wordDiv.appendChild(box);
    });
    layout.appendChild(wordDiv);
    if(wi<words.length-1){
      const gap=document.createElement('div');
      gap.style.cssText='width:12px;height:28px;flex-shrink:0;';
      layout.appendChild(gap);
    }
  });
}

function lev(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function wordStatus(gw,tw){
  if(gw===tw)return 'correct';
  if(gw.length>=3&&tw.length>=3&&(tw.startsWith(gw)||gw.startsWith(tw)))return 'close';
  const sim=1-(lev(gw,tw)/Math.max(gw.length,tw.length));
  if(gw.length>=4&&sim>=0.6)return 'close';
  return 'wrong';
}

function toggleHistory(){
  const list=document.getElementById('history-list');
  const btn=document.getElementById('history-btn');
  const open=list.classList.toggle('open');
  btn.textContent=open?'Hide session history':'Show session history';
}

function renderHistory(){
  const toggle=document.getElementById('history-toggle');
  const list=document.getElementById('history-list');
  if(sessionHistory.length===0){toggle.style.display='none';return;}
  toggle.style.display='block';
  list.innerHTML='';
  // most recent first
  [...sessionHistory].reverse().forEach(entry=>{
    const item=document.createElement('div');
    item.className='history-item';
    const guessText=entry.guesses.length>0?entry.guesses.join(', '):'no wrong guesses';
    item.innerHTML=`
      <img class="history-thumb" src="${entry.photo}" alt="${entry.name}" />
      <div class="history-info">
        <div class="history-name">${entry.name}</div>
        <div class="history-guesses">Wrong guesses: ${guessText}</div>
      </div>
      <div class="history-outcome ${entry.won?'win':'loss'}">${entry.won?'✓':'✗'}</div>
    `;
    list.appendChild(item);
  });
}

function nextPerson(){
  if(usedIdx.length>=people.length)usedIdx=[];
  let pool=people.filter((_,i)=>!usedIdx.includes(i));
  let p=pool[Math.floor(Math.random()*pool.length)];
  usedIdx.push(people.indexOf(p));
  current=p;guessesLeft=2;
  document.getElementById('main-photo').src=p.photo;
  document.getElementById('cat-tag').textContent=p.cat;
  document.getElementById('gleft').textContent='2 guesses left';
  document.getElementById('gleft').className='gbadge';
  document.getElementById('guess-feedback').innerHTML='';
  document.getElementById('ginput').value='';
  document.getElementById('input-row').style.display='flex';
  document.getElementById('result-card').className='result-card';
  document.getElementById('name-layout').innerHTML='';
  document.getElementById('ginput').focus();
  updateScore();
}

function updateScore(){
  document.getElementById('sw').textContent=won;
  document.getElementById('sl').textContent=lost;
  document.getElementById('ss').textContent=streak;
}

function submitGuess(){
  const inp=document.getElementById('ginput');
  const guess=inp.value.trim();
  if(!guess||!current)return;
  const cn=normFull(current.name);
  const gn=normFull(guess);
  const targetWords=cn.split(' ').filter(w=>w.length>1);
  const guessWords=gn.split(' ').filter(w=>w.length>1);
  const correct=gn===cn||
    (guessWords.length>0&&guessWords.every(gw=>targetWords.some(tw=>gw===tw)));
  if(correct){
    won++;streak++;
    renderLayout(current.name,guess,true);
    endGame(true);
  } else {
    guessesLeft--;
    const fb=document.getElementById('guess-feedback');
    const pill=document.createElement('span');
    pill.className='gpill';
    let html='';
    guessWords.forEach(gw=>{
      let best='wrong';
      targetWords.forEach(tw=>{const s=wordStatus(gw,tw);if(s==='correct')best='correct';else if(s==='close'&&best!=='correct')best='close';});
      const color=best==='correct'?'#3B6D11':best==='close'?'#BA7517':'#A32D2D';
      html+=`<span style="color:${color};font-weight:500;margin:0 2px">${gw}</span>`;
    });
    pill.innerHTML=html;
    fb.appendChild(pill);
    inp.value='';
    if(guessesLeft<=0){
      lost++;streak=0;
      renderLayout(current.name,null,true);
      endGame(false);
    } else {
      renderLayout(current.name,guess,false);
      document.getElementById('gleft').textContent='Last guess — green letters are in the right spot';
      document.getElementById('gleft').className='gbadge last';
    }
  }
}

function endGame(success){
  document.getElementById('input-row').style.display='none';
  document.getElementById('result-card').className='result-card show';
  document.getElementById('cat-emoji').textContent=success?happyCats[Math.floor(Math.random()*happyCats.length)]:sadCats[Math.floor(Math.random()*sadCats.length)];
  const msg=document.getElementById('outcome-msg');
  if(success)msg.innerHTML=`<div class="outcome-win">${wins[Math.floor(Math.random()*wins.length)]}</div>`;
  else msg.innerHTML=`<div class="outcome-loss">${roasts[Math.floor(Math.random()*roasts.length)]}</div>`;
  sessionHistory.push({name:current.name,photo:current.photo,won:success,guesses:Array.from(document.getElementById('guess-feedback').querySelectorAll('.gpill')).map(p=>p.innerText.trim())});
  renderHistory();
  document.getElementById('reveal-cat').textContent=current.cat;
  document.getElementById('funfact').innerHTML=current.fact;
  updateScore();
}

document.getElementById('ginput').addEventListener('keydown',e=>{if(e.key==='Enter')submitGuess();});
nextPerson();
</script>
